<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>로그인 결과입니다.</title>
    <script type="text/javascript">
        function logout(){
            let f=confirm("로그아웃 하시겠습니까?");
            if(f)
                location.href="logout"; //Controller에서 기능으로 연결..
        }
    </script>
</head>
<body align="center">
<div th:if="${session.mvo != null}">
<h1>"<bold th:text="${session.mvo.name}">  </bold>"</h1>
님은 로그인 하셨습니다.
</div>
<form action="index.html">
    <input type="submit" value="홈으로">
</form>
<br>
<form action="javascript:logout()">
    <input type="submit" value="로그아웃">
</form>
</body>
</html>
